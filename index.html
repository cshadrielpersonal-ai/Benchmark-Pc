<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CoreX 3D Web Benchmark</title>
    <!-- Include Three.js via CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #0a0a0c;
            color: #e2e8f0;
        }

        #bg-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        #ui-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 30px;
            background: linear-gradient(to bottom, rgba(10,10,12,0.8) 0%, rgba(0,0,0,0) 40%, rgba(10,10,12,0.8) 100%);
            pointer-events: none;
        }

        header, #dashboard, #control-panel, #results-screen {
            pointer-events: auto;
        }

        header h1 {
            font-size: 2rem;
            letter-spacing: 2px;
            font-weight: 800;
        }

        header h1 span {
            color: #00ffcc;
        }

        header p {
            color: #718096;
            font-size: 0.9rem;
        }

        #dashboard {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .stat-box {
            background: rgba(26, 32, 44, 0.7);
            border: 1px solid rgba(0, 255, 204, 0.2);
            padding: 15px 25px;
            border-radius: 8px;
            backdrop-filter: blur(5px);
            min-width: 150px;
        }

        .stat-box .label {
            display: block;
            font-size: 0.75rem;
            color: #a0aec0;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .stat-box .value {
            font-size: 1.8rem;
            font-weight: bold;
            color: #ffffff;
        }

        #control-panel {
            align-self: center;
            margin-bottom: 50px;
        }

        button {
            background: #00ffcc;
            color: #0a0a0c;
            border: none;
            padding: 15px 40px;
            font-size: 1.1rem;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.4);
            transition: all 0.3s ease;
        }

        button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.7);
        }

        #results-screen {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 23, 42, 0.95);
            border: 2px solid #00ffcc;
            padding: 40px;
            border-radius: 16px;
            text-align: center;
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            max-width: 450px;
            width: 90%;
        }

        #results-screen.hidden {
            display: none;
        }

        #results-screen h2 {
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .score-display {
            margin: 20px 0;
        }

        .score-label {
            display: block;
            color: #94a3b8;
            font-size: 0.9rem;
        }

        #final-score {
            font-size: 4rem;
            font-weight: 900;
            color: #00ffcc;
            text-shadow: 0 0 20px rgba(0, 255, 204, 0.3);
        }

        #performance-tier {
            margin-bottom: 30px;
            color: #cbd5e1;
            font-style: italic;
        }

        #retry-btn {
            background: transparent;
            color: #00ffcc;
            border: 2px solid #00ffcc;
            box-shadow: none;
        }
        #retry-btn:hover {
            background: #00ffcc;
            color: #0a0a0c;
        }
    </style>
</head>
<body>
    <div id="ui-container">
        <header>
            <h1>CORE<span>X</span> 3D BENCHMARK</h1>
            <p>Testing WebGL & Hardware Rendering Capabilities</p>
        </header>

        <div id="dashboard">
            <div class="stat-box">
                <span class="label">Current FPS</span>
                <span id="fps-counter" class="value">--</span>
            </div>
            <div class="stat-box">
                <span class="label">Objects Rendered</span>
                <span id="object-counter" class="value">0</span>
            </div>
            <div class="stat-box">
                <span class="label">Elapsed Time</span>
                <span id="timer" class="value">0s / 15s</span>
            </div>
        </div>

        <div id="control-panel">
            <button id="start-btn">RUN BENCHMARK</button>
        </div>

        <div id="results-screen" class="hidden">
            <h2>Benchmark Complete!</h2>
            <div class="score-display">
                <span class="score-label">YOUR SCORE</span>
                <span id="final-score">0</span>
            </div>
            <p id="performance-tier">Analyzing hardware...</p>
            <button id="retry-btn">Run Again</button>
        </div>
    </div>

    <canvas id="bg-canvas"></canvas>

    <script>
        let scene, camera, renderer;
        let objects = [];
        let isRunning = false;
        let startTime;
        let duration = 15000; // 15 seconds test duration

        // Performance tracking metrics
        let frameCount = 0;
        let totalFrames = 0;
        let lastFpsUpdate = 0;
        let fpsHistory = [];

        // DOM Elements
        const startBtn = document.getElementById('start-btn');
        const retryBtn = document.getElementById('retry-btn');
        const fpsCounter = document.getElementById('fps-counter');
        const objectCounter = document.getElementById('object-counter');
        const timerDisplay = document.getElementById('timer');
        const resultsScreen = document.getElementById('results-screen');
        const finalScoreDisplay = document.getElementById('final-score');
        const tierDisplay = document.getElementById('performance-tier');

        // Initialize the 3D Scene
        function init() {
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x0a0a0c, 0.015);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('bg-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2)); // Cap scaling for performance parity

            // Add ambient and dynamic lights
            const ambientLight = new THREE.AmbientLight(0x111122);
            scene.add(ambientLight);

            const dirLight1 = new THREE.DirectionalLight(0x00ffcc, 1);
            dirLight1.position.set(10, 20, 15);
            scene.add(dirLight1);

            const dirLight2 = new THREE.DirectionalLight(0xff007f, 0.8);
            dirLight2.position.set(-10, -20, -15);
            scene.add(dirLight2);

            // Initial standby workload
            spawnObjects(200);

            window.addEventListener('resize', onWindowResize);
            animate(0);
        }

        // Function to generate hardware stressing objects
        function spawnObjects(count) {
            // Complex geometry pushes GPU vertex shaders
            const geometry = new THREE.TorusKnotGeometry(1, 0.3, 64, 8); 
            
            for (let i = 0; i < count; i++) {
                // High-roughness metallic materials enforce complex lighting pipeline passes
                const material = new THREE.MeshStandardMaterial({
                    color: Math.random() > 0.5 ? 0x00ffcc : 0xff007f,
                    roughness: 0.2,
                    metalness: 0.8
                });

                const mesh = new THREE.Mesh(geometry, material);
                
                mesh.position.set(
                    (Math.random() - 0.5) * 60,
                    (Math.random() - 0.5) * 60,
                    (Math.random() - 0.5) * 40
                );
                
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, 0);
                
                mesh.userData = {
                    rotX: (Math.random() - 0.5) * 0.02,
                    rotY: (Math.random() - 0.5) * 0.02
                };

                scene.add(mesh);
                objects.push(mesh);
            }
            objectCounter.innerText = objects.length;
        }

        function startBenchmark() {
            if(!resultsScreen.classList.contains('hidden')) {
                resultsScreen.classList.add('hidden');
            }
            
            // Wipe standard standby objects
            objects.forEach(obj => scene.remove(obj));
            objects = [];
            
            startBtn.style.display = 'none';
            isRunning = true;
            startTime = performance.now();
            lastFpsUpdate = startTime;
            frameCount = 0;
            totalFrames = 0;
            fpsHistory = [];

            // Spawn immediate heavy test workload
            spawnObjects(1200);
        }

        function endBenchmark() {
            isRunning = false;
            startBtn.style.display = 'inline-block';
            
            const averageFps = fpsHistory.reduce((a, b) => a + b, 0) / fpsHistory.length;
            
            // Score Logic: Total meshes kept live relative to frame rate consistency
            const score = Math.round(averageFps * 150);

            let tier = "Entry Level (Great for everyday tasks)";
            if (score > 12000) tier = "Enthusiast God Tier (High-end Gaming / Workstation PC)";
            else if (score > 8000) tier = "High-End Tier (Solid Dedicated Gaming GPU)";
            else if (score > 4000) tier = "Mid-Range Tier (Decent Dedicated GPU / Modern Laptop)";

            finalScoreDisplay.innerText = score;
            tierDisplay.innerText = `Performance Level: ${tier} | Avg FPS: ${Math.round(averageFps)}`;
            resultsScreen.classList.remove('hidden');
        }

        function animate(timestamp) {
            requestAnimationFrame(animate);

            // Engine transformations
            objects.forEach(obj => {
                obj.rotation.x += obj.userData.rotX || 0.005;
                obj.rotation.y += obj.userData.rotY || 0.005;
            });

            const time = timestamp * 0.0005;
            camera.position.x = Math.sin(time) * 5;
            camera.position.y = Math.cos(time) * 5;
            camera.lookAt(scene.position);

            if (isRunning) {
                frameCount++;
                totalFrames++;
                
                const elapsed = timestamp - startTime;
                
                // Steadily inject heavier objects to locate breaking limits
                if (frameCount % 30 === 0 && elapsed < duration - 2000) {
                    spawnObjects(80); 
                }

                // FPS tracker sampling interval
                if (timestamp - lastFpsUpdate >= 500) {
                    const currentFps = Math.round((frameCount * 1000) / (timestamp - lastFpsUpdate));
                    fpsCounter.innerText = currentFps;
                    fpsHistory.push(currentFps);
                    
                    frameCount = 0;
                    lastFpsUpdate = timestamp;
                }

                const secondsRemaining = Math.min((elapsed / 1000).toFixed(1), (duration / 1000));
                timerDisplay.innerText = `${secondsRemaining}s / ${duration/1000}s`;

                if (elapsed >= duration) {
                    endBenchmark();
                }
            }

            renderer.render(scene, camera);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        startBtn.addEventListener('click', startBenchmark);
        retryBtn.addEventListener('click', startBenchmark);

        init();
    </script>
</body>
</html>
